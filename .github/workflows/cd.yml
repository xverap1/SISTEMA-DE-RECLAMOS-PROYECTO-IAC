name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write # necesario para autenticación OIDC contra AWS
  contents: read

env:
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
  
jobs:
  deploy-infra:
    name: Terraform apply + build/deploy Lambdas
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: iac
    outputs:
      frontend_bucket: ${{ steps.tf_outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.tf_outputs.outputs.cloudfront_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar Node.js 18 (para empaquetar las Lambdas)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: src/lambdas/package-lock.json

      - name: Instalar dependencias y construir las Lambdas
        working-directory: src/lambdas
        run: |
          npm install
          npm run build

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform init
        run: terraform init

      - name: terraform plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}

      - name: terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Leer outputs de Terraform (bucket + distribution id)
        id: tf_outputs
        run: |
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Build + deploy frontend (S3 + CloudFront)
    needs: deploy-infra
    runs-on: ubuntu-latest
    environment: production
    env:
      FRONTEND_DIR: src/frontend/catalogo-productos-front.worktrees/agents-external-bee
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Build de producción
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Sincronizar con S3
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          aws s3 sync dist/catalogo-productos-front/browser "s3://${{ needs.deploy-infra.outputs.frontend_bucket }}" --delete

      - name: Invalidar caché de CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.deploy-infra.outputs.cloudfront_id }}" \
            --paths "/*"

  deploy-monitoring:
    name: Provisionar observabilidad (Ansible -> Grafana + Prometheus)
    needs: deploy-infra
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Ansible y dependencias
        run: |
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Ejecutar playbook (Docker + Prometheus + Grafana, sobre este mismo runner)
        run: |
          ansible-playbook -i inventory/hosts.ini playbook.yml \
            --extra-vars "grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"

      - name: Verificar que Grafana y Prometheus levantaron
        run: |
          sleep 5
          curl -sf http://localhost:3000/api/health
          curl -sf http://localhost:9090/-/healthy
