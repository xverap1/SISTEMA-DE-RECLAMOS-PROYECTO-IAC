name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  FRONTEND_DIR: src/frontend/catalogo-productos-front.worktrees/agents-external-bee

jobs:
  # ---------------------------------------------------------------------
  # Backend: Spring Boot (Java 17 / Maven)
  # ---------------------------------------------------------------------
  backend:
    name: Backend (Maven build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilar y ejecutar pruebas
        run: ./mvnw -B clean verify

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: src/backend/target/surefire-reports/

  # ---------------------------------------------------------------------
  # Frontend: Angular
  # ---------------------------------------------------------------------
  frontend:
    name: Frontend (Angular build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Pruebas unitarias (headless Chrome)
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build de producción
        run: npm run build -- --configuration production

      - name: Publicar artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIR }}/dist/

  # ---------------------------------------------------------------------
  # Lambdas: Node.js 18
  # ---------------------------------------------------------------------
  lambdas:
    name: Lambdas (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/lambdas
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: src/lambdas/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Pruebas unitarias (Jest, con cobertura)
        run: npm test

      - name: Build (esbuild -> dist/<lambda>/index.js)
        run: npm run build

      - name: Publicar artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: lambdas-dist
          path: src/lambdas/dist/

  # ---------------------------------------------------------------------
  # Infraestructura como código: Terraform + análisis de seguridad
  # ---------------------------------------------------------------------
  terraform:
    name: Terraform (fmt + validate + tflint + checkov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: terraform init (sin backend remoto, solo para validar)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint --init && tflint -f compact
        working-directory: iac

      - name: Checkov (escaneo de seguridad de IaC)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          quiet: true
          soft_fail: true 

  observability:
    name: Observabilidad (Ansible -> Grafana + Prometheus + validaciones)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4

      - name: Validar dashboards JSON de Grafana
        run: |
          for f in ../monitoring/grafana/dashboards/*.json; do
            echo "Validando $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Instalar Ansible y dependencias
        run: |
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Lint de Ansible
        run: |
          pip install ansible-lint
          ansible-lint playbook.yml

      - name: Ejecutar playbook (provisiona el entorno + Prometheus + Grafana)
        run: |
          ansible-playbook -i inventory/hosts.ini playbook.yml \
            --extra-vars "grafana_admin_password=ci-test-password"

      - name: Verificar que Prometheus está scrapeando y Grafana responde
        run: |
          sleep 5
          curl -sf http://localhost:9090/-/healthy
          curl -sf http://localhost:3000/api/health
          echo "### Observabilidad" >> "$GITHUB_STEP_SUMMARY"
          echo "Node.js, Java 17, Docker, Terraform y AWS CLI provisionados por Ansible; Grafana y Prometheus arriba en este runner." >> "$GITHUB_STEP_SUMMARY"

      - name: Bajar el stack (limpieza)
        if: always()
        run: docker compose -f ../monitoring/docker-compose.yml down -v
