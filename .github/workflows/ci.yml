name: CI

# Se ejecuta en cada Pull Request y en cada push a develop/main.
# Objetivo: dar feedback rápido (build + tests + linters) SIN tocar AWS.
# El despliegue real vive en cd.yml y solo corre después de que CI pase.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  FRONTEND_DIR: src/frontend/catalogo-productos-front.worktrees/agents-external-bee

jobs:
  # ---------------------------------------------------------------------
  # Backend: Spring Boot (Java 17 / Maven)
  # ---------------------------------------------------------------------
  backend:
    name: Backend (Maven build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Dar permiso de ejecución a mvnw
        run: chmod +x mvnw

      - name: Compilar y ejecutar pruebas
        run: ./mvnw -B clean verify

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: src/backend/target/surefire-reports/

  # ---------------------------------------------------------------------
  # Frontend: Angular
  # ---------------------------------------------------------------------
  frontend:
    name: Frontend (Angular build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Pruebas unitarias (headless Chrome)
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build de producción
        run: npm run build -- --configuration production

      - name: Publicar artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIR }}/dist/

  # ---------------------------------------------------------------------
  # Lambdas: Node.js 18
  # ---------------------------------------------------------------------
  lambdas:
    name: Lambdas (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/lambdas
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: src/lambdas/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Pruebas unitarias (Jest, con cobertura)
        run: npm test

      - name: Build (esbuild -> dist/<lambda>/index.js)
        run: npm run build

      - name: Publicar artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: lambdas-dist
          path: src/lambdas/dist/

  # ---------------------------------------------------------------------
  # Infraestructura como código: Terraform + análisis de seguridad
  # ---------------------------------------------------------------------
  terraform:
    name: Terraform (fmt + validate + tflint + checkov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: terraform init (sin backend remoto, solo para validar)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - run: tflint --init && tflint -f compact
        working-directory: iac

      - name: Checkov (escaneo de seguridad de IaC)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          quiet: true
          soft_fail: true # no bloquea el pipeline; revisar hallazgos en el summary de Actions

  # ---------------------------------------------------------------------
  # Observabilidad: valida que la config de Prometheus/Grafana no esté rota
  # ---------------------------------------------------------------------
  # ---------------------------------------------------------------------
  # Observabilidad: Ansible levanta Prometheus + Grafana en este mismo
  # runner y se valida que respondan. Así se ve la automatización completa
  # corriendo en cada push, sin depender de ningún servidor externo (EC2, etc).
  # ---------------------------------------------------------------------
  observability:
    name: Observabilidad (Ansible -> Grafana + Prometheus + validaciones)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4

      - name: Validar dashboards JSON de Grafana
        run: |
          for f in ../monitoring/grafana/dashboards/*.json; do
            echo "Validando $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Instalar Ansible y dependencias
        run: |
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Lint de Ansible
        run: |
          pip install ansible-lint
          ansible-lint playbook.yml

      - name: Ejecutar playbook (provisiona el entorno + Prometheus + Grafana)
        run: |
          ansible-playbook -i inventory/hosts.ini playbook.yml \
            --extra-vars "grafana_admin_password=ci-test-password"

      - name: Verificar que Prometheus está scrapeando y Grafana responde
        run: |
          sleep 5
          curl -sf http://localhost:9090/-/healthy
          curl -sf http://localhost:3000/api/health
          echo "### Observabilidad " >> "$GITHUB_STEP_SUMMARY"
          echo "Node.js, Java 17, Docker, Terraform y AWS CLI provisionados por Ansible; Grafana y Prometheus arriba en este runner." >> "$GITHUB_STEP_SUMMARY"

      - name: Bajar el stack (limpieza)
        if: always()
        run: docker compose -f ../monitoring/docker-compose.yml down -v

  # ---------------------------------------------------------------------
  # SonarQube (self-hosted, Community Edition): se levanta de cero en este
  # mismo runner (docker compose), se corre el analisis, y se apaga al
  # terminar.
  # ---------------------------------------------------------------------
  sonarqube:
    name: SonarQube (analisis estatico, efimero en el runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17 (para compilar el backend antes del analisis)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Dar permiso de ejecución a mvnw
        working-directory: src/backend
        run: chmod +x mvnw

      - name: Compilar el backend (genera target/classes para sonar.java.binaries)
        working-directory: src/backend
        run: ./mvnw -B -q compile

      - name: Levantar SonarQube + Postgres
        working-directory: sonarqube
        run: docker compose up -d

      - name: Esperar a que SonarQube esté listo
        run: |
          for i in $(seq 1 40); do
            status=$(curl -s http://localhost:9000/api/system/status | grep -o '"status":"[A-Z]*"' || true)
            echo "intento $i: $status"
            [[ "$status" == '"status":"UP"' ]] && break
            sleep 5
          done

      - name: Generar un token de analisis (instancia recien creada, credenciales por defecto)
        id: sonar_token
        run: |
          token=$(curl -s -u admin:admin -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=ci-$(date +%s)" \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['token'])")
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Correr sonar-scanner
        run: |
          docker run --rm --network=host \
            -e SONAR_HOST_URL=http://localhost:9000 \
            -e SONAR_TOKEN="${{ steps.sonar_token.outputs.token }}" \
            -v "${{ github.workspace }}:/usr/src" \
            sonarsource/sonar-scanner-cli \
            -Dproject.settings=sonarqube/sonar-project.properties

      - name: Resumen
        if: always()
        run: |
          echo "### SonarQube " >> "$GITHUB_STEP_SUMMARY"
          echo "Análisis corrido contra una instancia efímera en este runner (sin histórico entre pipelines, ver sonarqube/README.md)." >> "$GITHUB_STEP_SUMMARY"

      - name: Bajar SonarQube (limpieza)
        if: always()
        working-directory: sonarqube
        run: docker compose down -v
        
 