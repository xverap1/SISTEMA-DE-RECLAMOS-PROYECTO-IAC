---
- name: Verificar version de Terraform instalada
  ansible.builtin.command: terraform version -json
  register: terraform_check
  changed_when: false
  failed_when: false

- name: Instalar Terraform {{ terraform_version }}
  when: terraform_check.rc != 0 or terraform_version not in (terraform_check.stdout | default(''))
  block:
    - name: Descargar Terraform {{ terraform_version }}
      ansible.builtin.get_url:
        url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
        dest: "/tmp/terraform_{{ terraform_version }}.zip"
        mode: "0644"

    - name: Descomprimir el binario en /usr/local/bin
      ansible.builtin.unarchive:
        src: "/tmp/terraform_{{ terraform_version }}.zip"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"

- name: Confirmar version de Terraform
  ansible.builtin.command: terraform version
  register: terraform_final
  changed_when: false

- name: Mostrar version de Terraform instalada
  ansible.builtin.debug:
    msg: "{{ terraform_final.stdout_lines[0] }}"
