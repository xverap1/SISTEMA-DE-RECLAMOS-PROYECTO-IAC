global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    proyecto: reclamos-ciudadanos

scrape_configs:

  - job_name: "gestor-productos-backend"
    metrics_path: /actuator/prometheus
    static_configs:

      - targets: ["host.docker.internal:8080"]
        labels:
          service: gestor-productos
          env: dev

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: monitoring-host

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
