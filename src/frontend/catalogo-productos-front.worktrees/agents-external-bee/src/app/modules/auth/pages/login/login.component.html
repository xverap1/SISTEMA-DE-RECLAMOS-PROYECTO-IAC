<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-md-5 col-lg-4">
    
    <div class="card shadow border-0 rounded-3">
      
      <div class="card-header text-center py-4 text-white rounded-top" style="background-color: #13322B;">
        <i class="bi bi-shield-lock fs-1 d-block mb-2"></i>
        <h4 class="mb-0 fw-bold text-uppercase tracking-wider">Control de Acceso</h4>
        <small class="text-white-50">Sistema de Administración de Catálogo</small>
      </div>

      <div class="card-body p-4">
        
        @if (errorMessage) {
          <div class="alert alert-danger d-flex align-items-center alert-dismissible fade show" role="alert" style="font-size: 0.9rem;">
            <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
            <div>{{ errorMessage }}</div>
          </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <div class="mb-3">
            <label for="usuario" class="form-label fw-semibold text-muted">Usuario Institucional</label>
            <div class="input-group">
              <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-person"></i></span>
              <input type="text" id="usuario" formControlName="usuario" 
                     class="form-control border-start-0 ps-0" placeholder="usuario.dev"
                     [ngClass]="{ 'is-invalid': f['usuario'].touched && f['usuario'].errors }">
              <div class="invalid-feedback">El nombre de usuario es obligatorio.</div>
            </div>
          </div>

          <div class="mb-4">
            <label for="contrasena" class="form-label fw-semibold text-muted">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-key"></i></span>
              <input type="password" id="contrasena" formControlName="contrasena" 
                     class="form-control border-start-0 ps-0" placeholder="••••••••"
                     [ngClass]="{ 'is-invalid': f['contrasena'].touched && f['contrasena'].errors }">
              <div class="invalid-feedback">La contraseña es obligatoria.</div>
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 py-2 fw-bold text-uppercase tracking-wide" 
                  style="background-color: #13322B; border: none;"
                  [disabled]="loginForm.invalid || isLoading">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Validando...
            } @else {
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
            }
          </button>

        </form>
      </div>

      <div class="card-footer bg-light text-center py-3" style="font-size: 0.8rem;">
        <span class="text-muted">Acceso restringido solo a personal autorizado.</span>
      </div>

    </div>

  </div>
</div>
