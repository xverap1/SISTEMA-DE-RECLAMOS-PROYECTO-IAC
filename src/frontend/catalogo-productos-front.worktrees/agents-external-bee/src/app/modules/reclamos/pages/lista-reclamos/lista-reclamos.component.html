<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Mis Reclamos</h3>
    <div>
      <button class="btn btn-primary me-2" (click)="toggleFormulario()">
        {{ mostrandoFormulario ? 'Cancelar' : '+ Nuevo reclamo' }}
      </button>
      <button class="btn btn-outline-secondary" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>

  <!-- Formulario de nuevo reclamo -->
  <div class="card mb-4" *ngIf="mostrandoFormulario">
    <div class="card-body">
      <form [formGroup]="reclamoForm" (ngSubmit)="onCrearReclamo()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Tipo de reclamo</label>
            <input type="text" class="form-control" formControlName="tipoReclamo" placeholder="Ej: FACTURACION" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Folio de referencia</label>
            <input type="text" class="form-control" formControlName="folioReferencia" />
          </div>
          <div class="col-md-12">
            <label class="form-label">Asunto</label>
            <input type="text" class="form-control" formControlName="asunto" />
          </div>
          <div class="col-md-12">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" rows="3" formControlName="descripcion"></textarea>
          </div>
          <div class="col-md-4">
            <label class="form-label">Prioridad</label>
            <select class="form-select" formControlName="prioridad">
              <option *ngFor="let p of prioridades" [value]="p">{{ p }}</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Ubigeo del incidente</label>
            <input type="text" class="form-control" formControlName="ubigeoIncidente" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Dirección del incidente</label>
            <input type="text" class="form-control" formControlName="direccionIncidente" />
          </div>
        </div>
        <button type="submit" class="btn btn-success mt-3" [disabled]="enviando">
          {{ enviando ? 'Enviando...' : 'Enviar reclamo' }}
        </button>
      </form>
    </div>
  </div>

  <!-- Tabla de reclamos -->
  <div *ngIf="cargando" class="text-center text-muted">Cargando...</div>

  <table class="table table-striped" *ngIf="!cargando">
    <thead>
      <tr>
        <th>Folio</th>
        <th>Asunto</th>
        <th>Prioridad</th>
        <th>Estado</th>
        <th>Fecha registro</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reclamos">
        <td>{{ r.folioReferencia }}</td>
        <td>{{ r.asunto }}</td>
        <td>{{ r.prioridad }}</td>
        <td><span [class]="claseEstado(r.estadoTicket)">{{ r.estadoTicket }}</span></td>
        <td>{{ r.fechaRegistro | date: 'dd/MM/yyyy HH:mm' }}</td>
      </tr>
      <tr *ngIf="reclamos.length === 0">
        <td colspan="5" class="text-center text-muted">Aún no tienes reclamos registrados.</td>
      </tr>
    </tbody>
  </table>
</div>
