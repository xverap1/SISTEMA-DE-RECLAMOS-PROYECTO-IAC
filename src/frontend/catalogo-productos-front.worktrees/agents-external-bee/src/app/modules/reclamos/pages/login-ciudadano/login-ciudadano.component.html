<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow p-4" style="max-width: 420px; width: 100%;">
    <h3 class="text-center mb-3">Portal del Ciudadano</h3>
    <p class="text-center text-muted mb-4">Sistema de Reclamos</p>

    <!-- LOGIN -->
    <form *ngIf="vista === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" formControlName="password" />
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
        {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
      </button>
      <p class="text-center mt-3 mb-0">
        ¿No tienes cuenta?
        <a href="javascript:void(0)" (click)="cambiarVista('registro')">Regístrate</a>
      </p>
    </form>

    <!-- REGISTRO -->
    <form *ngIf="vista === 'registro'" [formGroup]="registroForm" (ngSubmit)="onRegistro()">
      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" formControlName="nombre" />
      </div>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" formControlName="password" />
        <small class="text-muted">Mínimo 8 caracteres, con mayúscula, minúscula, número y símbolo.</small>
      </div>
      <div class="mb-3">
        <label class="form-label">Teléfono (opcional)</label>
        <input type="text" class="form-control" formControlName="telefono" />
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
        {{ isLoading ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
      <p class="text-center mt-3 mb-0">
        ¿Ya tienes cuenta?
        <a href="javascript:void(0)" (click)="cambiarVista('login')">Inicia sesión</a>
      </p>
    </form>

    <!-- CONFIRMAR CODIGO -->
    <form *ngIf="vista === 'confirmar'" [formGroup]="confirmarForm" (ngSubmit)="onConfirmar()">
      <p class="text-muted">Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Código de verificación</label>
        <input type="text" class="form-control" formControlName="codigo" />
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
        {{ isLoading ? 'Verificando...' : 'Verificar cuenta' }}
      </button>
    </form>
  </div>
</div>
